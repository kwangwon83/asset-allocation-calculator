        <table id="indexTable" style="display:none;">
            <thead>
                <tr><th>전략</th><th>보유 자산 및 비중</th></tr>

    <script src="js/data-loader.js"></script>
    <script src="js/engine.js"></script>
    <script>
        (async function() {
            try {
                const loader = new DataLoader();
                const { prices, economic } = await loader.loadAll();
                const engine = new AllocationEngine(prices, economic);

                const updated = prices?.meta?.lastUpdated;
                if (updated) document.getElementById('lastUpdated').textContent = 'Updated: ' + updated;

                const strategies = [
                    ['DUAL', '전통듀얼모멘텀'],
                    ['CDM', '종합듀얼모멘텀'],
                    ['ADM', '가속듀얼모멘텀'],
                    ['PERM', '영구포트폴리오'],
                    ['LAA', 'LAA'],
                    ['RAA', 'RAA'],
                    ['GTAA', 'GTAA'],
                    ['PAA', 'PAA'],
                    ['VAA', 'VAA'],
                    ['FAA', 'FAA'],
                    ['AAA', 'AAA'],
                    ['DAA', 'DAA'],
                    ['DGA', 'DGA'],
                    ['DYNBOND', '채권동적배분']
                ];

                const tbody = document.getElementById('indexBody');
                strategies.forEach(([sid, name]) => {
                    const result = engine.calculate(sid);
                    const assets = result
                        .filter(r => r.allocation > 0)
                        .map(r => r.ticker + ' ' + Math.round(r.allocation*100) + '%')
                        .join(', ');

                    const tr = document.createElement('tr');
                    tr.innerHTML = '<td><a href="' + sid.toLowerCase() + '.html">' + name + '</a></td>' +
                                   '<td>' + (assets || '현금 100%') + '</td>';
                    tbody.appendChild(tr);
                });

                document.getElementById('indexTable').style.display = '';
            } catch (e) {
                console.error(e);
                document.getElementById('indexBody').innerHTML = '<tr><td colspan="2" class="error-msg">데이터를 불러오는 중 오류가 발생했습니다.</td></tr>';
            } finally {
                document.querySelector('.loading-wrap').style.display = 'none';
            }
        })();
    </script>

    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js" crossorigin="anonymous"></script>

    <script>
        (function () {
            var toggle = document.querySelector('.sidebar-toggle');
            var menu = document.getElementById('sideStrategyMenu');
            var overlay = document.querySelector('.side-overlay');
            if (!toggle || !menu || !overlay) return;

            function closeMenu() {
                document.body.classList.remove('side-open');
                toggle.setAttribute('aria-expanded', 'false');
            }

            toggle.addEventListener('click', function () {
                var opened = document.body.classList.toggle('side-open');
                toggle.setAttribute('aria-expanded', opened ? 'true' : 'false');
            });

            overlay.addEventListener('click', closeMenu);
            menu.querySelectorAll('a').forEach(function (a) {
                a.addEventListener('click', closeMenu);
            });

            window.addEventListener('resize', function () {
                if (window.innerWidth >= 992) closeMenu();
            });
        })();
    </script>
