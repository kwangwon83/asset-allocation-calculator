		<section class="explain">
			<h1 align="center">RAA</h1>
			<h2 align="center">(RAA(Resilient))</h2>
			<div>
				<ul class="first-level">
					<li>RAA란 각 자산별 1/3/6/12개월 모멘텀 스코어와 실업률을 조합해 동적으로 배분하는 전략</li>
				</ul>
			</div>
		</section>

		<div class="input-container">
			<section class="controlPanel">
				<p class="input-value">수 수 료(%) : <input type="text" class="feeInput" id="buysellfee" style="text-align:right;padding-right:10px;" value="0.25"/></p>
				<p class="input-value">금 액(USD) : <input type="text" class="budgetInput" id="totalBudget" style="text-align:right;padding-right:10px;" oninput="allocation_calc()"/></p>
			</section>
		</div>

		<div class="content-container">
			<section class="dataTable">
				<div class="remark">※ 실시간 주가와 다소 차이가 있을 수 있음</div>
				<div class="loading_space" align="center"><br><div class="loader"></div></div>
				<table class="assetTable">
					<thead class="titleTable"></thead>
					<tbody class="contentTable"></tbody>
				</table>
			</section>
			<section class="table-footnote"></section>
		</div>

		<footer class="footer">
			<div class="footer-content">

			</div>
		</footer>

		<script>
			(async function() {{
				const loader = new DataLoader();
				const {{ prices, economic }} = await loader.loadAll();
				const engine = new AllocationEngine(prices, economic);
				const renderer = new Renderer(engine);
				const strategy = document.getElementById('hidden-footer').innerText.trim();
				await renderer.render(strategy);
				document.querySelector('.loading_space').innerHTML = '';
			}})();
		</script>
